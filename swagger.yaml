  '/subastas/{id}/sala':
    get:
      tags:
        - Sala en Vivo
      summary: Ingresar a la sala en vivo
      description: |
        Pantalla 29. Pre-ingreso → 30. Sala en vivo.
        Requiere: usuario registrado + categoría >= categoría subasta + medio de pago verificado.
        El usuario no puede estar conectado a más de una subasta a la vez.
        Retorna estado actual de la pieza en subasta y URL de streaming.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Datos de la sala en vivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalaEnVivo'
        '403':
          description: |
            No puede acceder. Posibles razones:
            - Categoría insuficiente
            - Sin medio de pago verificado
            - Ya conectado a otra subasta
            - Multa pendiente
            - Bloqueado judicialmente
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: SALA_CATEGORIA_INSUFICIENTE
                  message:
                    type: string
                    example: Tu categoría actual (común) no te permite acceder a esta subasta. Mejorá tu categoría para participar.
                  details:
                    type: object
                    nullable: true
                    example:
                      categoriaUsuario: comun
                      categoriaRequerida: especial
              examples:
                categoria_insuficiente:
                  summary: Categoría del usuario menor a la requerida
                  value:
                    code: SALA_CATEGORIA_INSUFICIENTE
                    message: Tu categoría actual (común) no te permite acceder a esta subasta. Mejorá tu categoría para participar.
                    details:
                      categoriaUsuario: comun
                      categoriaRequerida: especial
                sin_medio_pago:
                  summary: Sin medio de pago verificado
                  value:
                    code: SALA_SIN_MEDIO_PAGO
                    message: Necesitás tener al menos un medio de pago verificado para entrar a la subasta.
                    details:
                      mediosPagoVerificados: 0
                ya_conectado:
                  summary: Ya conectado a otra subasta
                  value:
                    code: SALA_YA_CONECTADO
                    message: Ya estás conectado a otra subasta en vivo. Salí de la actual antes de entrar a otra.
                    details:
                      subastaActualTitulo: 'Joyas Antiguas #12'
                multa_pendiente:
                  summary: Tiene multa sin pagar
                  value:
                    code: SALA_MULTA_PENDIENTE
                    message: Tenés una multa pendiente de pago. Aboná la multa para poder participar.
                    details:
                      montoMulta: 5000
        '404':
          description: Subasta no encontrada o no está en vivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: SALA_NO_DISPONIBLE
                  message:
                    type: string
                    example: La subasta no existe o no está en vivo en este momento.
                  details:
                    type: object
                    nullable: true
                    example: null
  '/subastas/{id}/pujas':
    post:
      tags:
        - Sala en Vivo
      summary: Realizar una puja
      description: |
        Pantalla 32. Confirmar puja → 33. Esperando confirmación → 34. Puja registrada.
        Validaciones:
        - monto >= mejorOferta + 1% del valorBase (pujaMinima)
        - monto <= mejorOferta + 20% del valorBase (pujaMaxima) — NO aplica en categorías oro y platino
        - Si tiene cheque como garantía, las compras totales no pueden superar el monto del cheque
        - La app no permite otro puje hasta recibir confirmación del sistema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearPujaRequest'
      responses:
        '201':
          description: Puja registrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PujaResponse'
        '400':
          description: |
            Puja inválida. Posibles errores:
            - Monto menor al mínimo permitido
            - Monto mayor al máximo permitido
            - Fondos insuficientes (cheque certificado)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: PUJA_MONTO_INSUFICIENTE
                  message:
                    type: string
                    example: El monto de tu puja es menor al mínimo. Debés ofertar al menos US$ 52.750 (última oferta + 1% del valor base).
                  details:
                    type: object
                    nullable: true
                    example:
                      montoOfertado: 52000
                      montoMinimo: 52750
              examples:
                monto_bajo:
                  summary: Monto menor al mínimo
                  value:
                    code: PUJA_MONTO_INSUFICIENTE
                    message: El monto de tu puja es menor al mínimo. Debés ofertar al menos US$ 52.750 (última oferta + 1% del valor base).
                    details:
                      montoOfertado: 52000
                      montoMinimo: 52750
                      mejorOfertaActual: 52300
                      valorBase: 45000
                monto_excedido:
                  summary: Monto mayor al máximo
                  value:
                    code: PUJA_MONTO_EXCEDIDO
                    message: El monto supera el máximo permitido de US$ 61.300 (última oferta + 20% del valor base). No aplica en subastas oro y platino.
                    details:
                      montoOfertado: 65000
                      montoMaximo: 61300
                fondos_cheque:
                  summary: Fondos del cheque insuficientes
                  value:
                    code: PUJA_FONDOS_CHEQUE_INSUFICIENTES
                    message: Tus compras superan el monto de tu cheque certificado. No podés seguir pujando con esta garantía.
                    details:
                      montoCheque: 50000
                      montoComprometido: 48500
