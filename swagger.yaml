        '400':
          description: 'Datos inválidos (faltan fotos, declaración no aceptada, etc.)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: VENTA_FOTOS_INSUFICIENTES
                  message:
                    type: string
                    example: Debés subir al menos 6 fotos del bien a subastar.
                  details:
                    type: object
                    nullable: true
                    example:
                      fotosEnviadas: 3
                      fotosRequeridas: 6
              examples:
                fotos_insuficientes:
                  summary: Faltan fotos
                  value:
                    code: VENTA_FOTOS_INSUFICIENTES
                    message: Debés subir al menos 6 fotos del bien a subastar.
                    details:
                      fotosEnviadas: 3
                      fotosRequeridas: 6
                declaracion_faltante:
                  summary: No aceptó declaración
                  value:
