      description: Pantalla 18. El usuario responde a una notificación enviando un mensaje privado a SubastaPlus dentro del hilo de esa notificación.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnviarMensajeRequest'
      responses:
        '201':
          description: Mensaje enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensaje'
        '400':
          description: Mensaje vacío o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: MENSAJE_CONTENIDO_VACIO
                  message:
                    type: string
                    example: El mensaje no puede estar vacío.
                  details:
                    type: object
                    nullable: true
                    example: null
        '404':
          description: Notificación no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NOTIFICACION_NO_ENCONTRADA
                  message:
                    type: string
                    example: La notificación solicitada no existe o ya fue eliminada.
                  details:
                    type: object
                    nullable: true
                    example: null
