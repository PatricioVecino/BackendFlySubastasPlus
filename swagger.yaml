        Pantallas 43-47. Pasos 1-5:
        1. Tipo de bien
        2. Descripción
        3. Fotos (mínimo 6)
        4. Historia (si es obra de arte)
        5. Declaración de propiedad

        El usuario declara que el bien le pertenece y no tiene impedimentos.
